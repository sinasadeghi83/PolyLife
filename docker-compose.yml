services:
  core:
    build: .
    container_name: polylife-core
    ports:
      - "8000:8000"
    # Config & secrets come from .env (copy .env.example -> .env).
    # The start script creates it for you; never hard-code secrets here.
    # required: false -> a missing .env falls back to settings defaults
    # (so CI builds and `down` don't fail before .env exists).
    env_file:
      - path: .env
        required: false
    networks:
      - polylife
    restart: unless-stopped

# Shared network so each team's gateway can reach the core by name (core:8000).
# Team stacks join this same network as `external`.
networks:
  polylife:
    name: polylife_net
