services:

  gateway:
    image: nginx:alpine

    ports:
      - "9104:80"

    volumes:
      - ./gateway.conf:/etc/nginx/conf.d/default.conf
      - ./staticfiles:/app/staticfiles:ro
      - ./media:/app/media:ro

    depends_on:
      - backend

    networks:
      - polylife
      - team

  backend:
    build: .

    env_file:
      - .env

    depends_on:
      - db

    networks:
      - polylife
      - team
    volumes:
      - ./staticfiles:/app/staticfiles
      - ./media:/app/media


  db:
    image: postgres:16-alpine

    env_file:
      - .env

    volumes:
      - postgres-data:/var/lib/postgresql/data

    networks:
      - team

#    ports:
#      - "5432:5432"

volumes:
  postgres-data:

networks:
  polylife:
    external: true
    name: polylife_net

  team: