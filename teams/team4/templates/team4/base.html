{% load static %}
<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

    <meta charset="UTF-8">

    <title>{% block title %}Workout Service{% endblock %}</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <link
        href="https://cdn.jsdelivr.net/gh/rastikerdar/vazir-font@v30.1.0/dist/font-face.css"
        rel="stylesheet">

    <link
        rel="stylesheet"
        href="{% static 'team4/css/style.css' %}">

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

    <div class="container">

        <a class="navbar-brand" href="/">
            🏋 Workout Service
        </a>

        <div class="navbar-nav">

            <a class="nav-link" href="/">
                Dashboard
            </a>

            <a class="nav-link" href="/exercises/">
                Exercises
            </a>

            <a class="nav-link" href="/workouts/">
                Programs
            </a>

            <a class="nav-link" href="/preferences/">
                Preference
            </a>

            <a class="nav-link" href="/favorites/">
                Favorites
            </a>

            <a class="nav-link" href="/history/">
                History
            </a>

            <a class="nav-link" href="/reports/">
                Reports
            </a>

        </div>

        <div>

            <span id="navbar-user"
                  class="text-white me-3">
                مهمان
            </span>

            <a
                id="login-link"
                class="btn btn-success"
                href="/login/">
                Login
            </a>

        </div>

    </div>

</nav>

<div class="container mt-4">

{% block content %}

{% endblock %}

</div>

<script src="{% static 'team4/js/api.js' %}"></script>

{% block scripts %}
{% endblock %}

</body>

</html>
