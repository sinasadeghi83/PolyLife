# Team team7 — deployment.
#
# No passwords/keys live in this file. All config comes from `.env`
# (the run script copies `.env.example` -> `.env` for you the first time).
#
# Out of the box only the gateway runs. Uncomment `backend` and `db` as you
# build your service. Start with:   ./run.ps1   (Windows)   or   ./run.sh
services:
  gateway:
    image: nginx:alpine
    ports:
      - "${TEAM_PORT}:80"               # your team's unique port (from .env)
    volumes:
      - ./gateway.conf:/etc/nginx/conf.d/default.conf:ro
    environment:
      - CORE_BASE_URL=${CORE_BASE_URL}  # from .env
    networks: [polylife]
    # depends_on: [backend]

  # --- Your service (uncomment when ready) ---------------------------------
  backend:
    build: .                          # builds this team's Django app
    env_file: .env                    # DB creds & secret key come from .env
    networks: [polylife, team]        # polylife -> reaches core; team -> reaches db + redis
    depends_on:
      db:
        condition: service_healthy   # wait for pg_isready before starting the app

  db:
    image: postgres:16-alpine
    env_file: .env                    # POSTGRES_DB/USER/PASSWORD from .env
    volumes: [db-data:/var/lib/postgresql/data]   # named volume keeps state across `down`
    networks: [team]                  # private: only our backend can reach it
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U team7_user -d team7"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Redis: chat fan-out (pub/sub) + rate limiting. Ephemeral cache — no volume.
  redis:
    image: redis:7-alpine
    networks: [team]                  # private: only our backend can reach it

volumes:
  db-data:                            # persists Postgres data across `down`

networks:
  polylife:                             # shared with the core (gateway <-> core)
    external: true
    name: polylife_net
  team:                                 # private app <-> db <-> redis (team-internal)