# Team team5 gateway (nginx).
# Authenticates every /api/ request against the core, then proxies to this
# team's backend.
#
# Upstreams are resolved at request time via Docker's embedded DNS (127.0.0.11)
# and variable proxy_pass — so the gateway STARTS even before your backend
# exists (then /api/ just returns 502 until you add it).
server {
    listen 80;
    resolver 127.0.0.11 valid=10s;

    # Ask the core: is this request authenticated? (forward-auth)
    location = /_auth {
        internal;
        set $core_verify http://core:8000/api/verify;
        proxy_pass              $core_verify;
        proxy_pass_request_body off;
        proxy_set_header        Content-Length "";
        proxy_set_header        Authorization $http_authorization;
        proxy_set_header        Cookie $http_cookie;
    }

    # Protected API: only reaches the backend if the core says "OK".
    location /api/ {
        auth_request /_auth;
        auth_request_set $user_id   $upstream_http_x_user_id;
        auth_request_set $user_name $upstream_http_x_user_username;
        proxy_set_header X-User-Id       $user_id;
        proxy_set_header X-User-Username $user_name;

        set $backend http://backend:8000;
        proxy_pass       $backend;
        proxy_set_header Host $host;
    }

    # Public landing. Until your backend is up, show a placeholder. Once the
    # `backend` service is enabled, comment out the `return` line and use the
    # three proxy lines below it.
    location / {
        default_type "text/html; charset=utf-8";
        return 200 '<h1>team5 gateway is up</h1><p>Core is connected. Add your backend service, then enable the proxy in gateway.conf.</p>';
        # set $backend http://backend:8000;
        # proxy_pass       $backend;
        # proxy_set_header Host $host;
    }

    # If the core rejects the request, send the user to the core login page.
    error_page 401 = @needs_login;
    location @needs_login { return 302 http://localhost:8000/login; }
}
